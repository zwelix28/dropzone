# Daily security health check — dependency audit, secret patterns, Supabase RLS coverage.
# Configure repository secrets (Settings → Secrets and variables → Actions):
#   SLACK_WEBHOOK_URL              — optional, Slack Incoming Webhook
#   SECURITY_REPORT_EMAIL_TO       — optional, recipient email
#   SECURITY_REPORT_EMAIL_FROM     — required with email (verified sender)
#   SENDGRID_API_KEY or RESEND_API_KEY — required with email
# Or use the SMTP job inputs below instead of SendGrid/Resend.

name: Daily security health

on:
  schedule:
    # 08:00 UTC every day
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  security-health:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run security health check
        id: check
        run: node scripts/security/health-check.mjs
        continue-on-error: true

      - name: Notify Slack / API email
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SECURITY_REPORT_EMAIL_TO: ${{ secrets.SECURITY_REPORT_EMAIL_TO }}
          SECURITY_REPORT_EMAIL_FROM: ${{ secrets.SECURITY_REPORT_EMAIL_FROM }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: node scripts/security/notify.mjs

      - name: Prepare SMTP email body
        if: always()
        run: node -e "const r=JSON.parse(require('fs').readFileSync('security-health-report.json','utf8')); require('fs').writeFileSync('security-email.txt', r.markdown)"

      - name: Email report (SMTP)
        if: always() && vars.SECURITY_USE_SMTP == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[${{ github.repository }}] Daily security health"
          to: ${{ secrets.SECURITY_REPORT_EMAIL_TO }}
          from: ${{ secrets.SECURITY_REPORT_EMAIL_FROM }}
          body: file://security-email.txt
        continue-on-error: true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-health-report
          path: security-health-report.json
          retention-days: 30

      - name: Fail workflow on critical/high findings
        if: steps.check.outcome == 'failure'
        run: |
          echo "Security health check reported fail status (critical/high vulnerabilities or exposures)."
          exit 1
